# Fly.io app for the Galactic Sovereign co-op host.
# Deploy: flyctl deploy -c fly.coop.toml --dockerfile Dockerfile.coop
# Fresh world: flyctl ssh console -C 'rm -f /data/world.json' -a <app>
#   then restart, or set GS_COOP_RESET=1 for one boot.

app = "galactic-sovereign-coop"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.coop"

[env]
  GS_COOP_HOST = "0.0.0.0"
  GS_COOP_PORT = "9090"
  GS_COOP_DATA_DIR = "/data"
  GS_COOP_SUMMARY_EVERY = "2"

[http_service]
  internal_port = 9090
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "coop_data"
  destination = "/data"
